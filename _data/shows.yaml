      Confessions of a Mulatto Love Child is a darkly funny and deeply moving
      solo storytelling show by Bellina Logan.

      Raised by her acerbic, larger-than-life English mother, Bellina grows up on outrageous stories, cultural collisions, and the relentless command to 'remember your life.' As her mother’s memory fades, the roles reverse and remembering becomes an act of love. With minimal set and rapid character shifts,

      Logan brings over a dozen voices to life in a bold, intimate piece about identity, memory and the enduring bond between mother and daughter.
