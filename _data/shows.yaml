    copy_long: >-
      Mere days after the death of Jesus Christ and hell-bent on clearing his
      name, Judas Iscariot makes his first public appearance on Simona Tonight,
      an ailing late-night talk show. But 33 AD Judea is a volatile place, and
      it's not just Judas and Simona whose reputations are on the line, but the

      broadcast TV industry's. Exploring themes of celebrity, betrayal and redemption, Judas Exclusive is a psychedelic channel-changing odyssey across 33 AD Judea through the dying lens of broadcast TV.
