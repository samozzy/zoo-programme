    copy_long: A raw and unflinching contemporary dance work, Everybody's Got a Bomb
      channels frustration, anger and isolation in a world that feels both hyper
      connected and profoundly detached. Driven by a rage at conformity and the
      global suffering we witness daily yet feel powerless to change, the work
      confronts the fragile line between civility and chaos, control and
      collapse. Inspired by moments of collective intensity and social rupture,
      it unfolds as a visceral physical experience. Relentless and deeply
      personal, the piece becomes both rebellion and release, a meditation on
      darkness, truth and the bonds holding us together.
