    copy_long: >-
      OnlyFans for Therapy is a darkly comic solo about trauma, accountability
      and the absurd  economics of healing. Whilst triggered on holiday, a woman
      realises the only way to remain a functional member of society is therapy
      for life.

      Quick maths: 2,599 sessions at £70 each. And that’s without inflation. So who pays: the victim, the perpetrator or the state? 


      A razor-edged exploration of abuse, revenge and survival in a world where recovery comes with a receipt. 'An exceptionally strong and intelligent performance, full of humour' (E-tcetera.be). Part of Big in Belgium.
