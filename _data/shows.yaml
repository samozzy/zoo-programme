    copy_long: >-
      'I got rid of all the toxic people and there was no one left.'

      Gail is good at setting boundaries and staying busy until a scary diagnosis forces her to ask for help. But, who can she trust? Her life takes unexpected turns, hilarious and shocking, leading to her participation as patient #13 out of 29 in a clinical study treating cancer survivors with anxiety and depression with magic mushrooms. 


      Winner: Progie Theater Award for outstanding progressive plays. Winner: LA Hidden Gems award. 'Magnetic and engaging in her intensity and candor... a masterclass in storytelling' **\*** BroadwayWorld.com).
