    copy_long: >-
      Join a real-life mother and daughter on a road trip from Donegal to
      southern Italy, as they weave their personal stories with those of Italian
      immigrants in Northern Ireland.



      Blending performance, video, archive testimony and live electronic music, the duo meet present-day migrants, activists and strangers along the route, asking who gets to draw the lines between us and them. 


      Performed in English, French and Italian with integrated subtitles, Aliens is an 'ambitious, memorable piece that treats familiar themes in new, even alien ways' (Irish Times). A meditation on inheritance, migration and those who live in between: the aliens.
