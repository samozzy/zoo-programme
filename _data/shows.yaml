    copy_long: >-
      Ever faced impossible odds? Stomach in knots? Needing a miracle? Well, New
      York attorney Andrea Coleman has. 


      Then she gets Divine communication (yay!) that somehow makes things scarier (no!). As she debates whether to trust these otherworldly instructions or protect her professional image, the courtroom becomes a playground for resilience, identity and digestive distress. 


      Blending courtroom drama and humour, this show celebrates the joy and absurdity of being

      alive. At its heart, the play asks what happens when you push your fear to the side and let yourself be a "killer".
