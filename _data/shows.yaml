    copy_long: Four circus artists move through a shifting world of revolving walls
      and floating doors. In EXIT, choreographer Piet Van Dycke blends circus
      and dance into a thrilling physical performance where movement, partner
      acrobatics and balance form one shared language. With backgrounds in
      bascule, aerial belts, trapeze and acro-dance, they create a dynamic
      interplay of trust, risk and transformation. They propel, catch, climb and
      balance as they search for their own path, yet need one another to keep
      moving. A powerful, visually striking exploration of independence,
      connection and fragile balance. Four bodies. One path. No way out alone.
