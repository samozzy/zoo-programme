      A hymn to life in the darkest moments – 26 April 1986: Chernobyl nuclear
      power plant explodes in Ukraine. 


      This intimate performance explores the deeply human side of the tragedy - not a reconstruction of events, but of emotions through the memories of Lyudmila, the wife of a firefighter. Her words are drawn from Prayer for Chernobyl by Svetlana Alexievich. Performed by one of Italy's most intense stage actresses, Elena Arvigo, 'a powerhouse performer... a devastatingly beautiful account of love that can overcome everything' **\***(BingeFringe.com). 'An urgent, harrowing, stunningly performed piece for the present age' **\***(BroadwayBaby.com).
