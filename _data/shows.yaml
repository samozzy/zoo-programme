    copy_long: >-
      Italy, autumn 1951. Heavy flooding causes the Po River tovburst its banks,
      turning the Polesine area into a huge lake. People flee with no time to
      choose what to take with them, they flee so they can return, they return
      so they can start over. 


      Autumn 2021. A woman is moving house for the umpteenth time. Searching through the rooms she decides to take EVERYTHING with her. Two tragedies intertwine in this monologue about deliberate and unintentional uprooting and the big and small events that change our lives, asking: could we ever really lose everything?
