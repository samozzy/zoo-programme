    copy_long: "Surprised by the audience and completely unprepared, two clowns grab
      the only story everyone knows: Romeo and Juliet. What begins as a funny
      mission to be understood soon turns into a wild whirlwind of imagination.
      You don't just watch, you become part of the chaos. This high-speed
      scramble is a real display of physical skill. But as the laughter peaks,
      the fun turns into a fierce rebellion – the one that lives inside us all.
      It's funny until it's not. A provocative, heart-wrenching finale that asks
      what remains among the ruins. Fearless, absurd and unforgettable."
