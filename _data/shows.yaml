    copy_long: "A man walks through Kyiv. The city walks through him.

      Blending live performance with documentary video filmed in Ukraine
      in 2025, this searing solo work is about resistance, exile and the
      dangerous seduction of violence. As past and present collide – from a 1911
      assassination to today’s full\x02scale invasion – one artist confronts his
      own limits: how far would you go for your dream? How much would you risk?

      Urgent, intimate and politically charged, this is theatre that
      refuses distance. History is not behind us. It is happening now."
