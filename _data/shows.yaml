    copy_long: "Soft Spot is a circus duet for a juggler, a handstand artist,vwooden
      planks and 300 wine glasses. Everyone has held a wine glass. Everyone has
      broken one. From childhood curiosity to adult caution, we share a
      relationship with this fragile everyday object. On stage, two artists
      carefully

      manipulate, stack and balance a delicate landscape, risking collapse
      at any moment. The glass becomes partner, obstacle and quiet threat –
      demanding precision and trust between performers. Each action carries
      tension; each near\x02collapse asks what might happen next. Unexpected
      outcomes reveal a playful, precise exploration of our fragile world."
