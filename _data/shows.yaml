      Opinions are weapons. Friendship is the casualty. 


      Liz and Sam host a theatre podcast. When Sam champions a radical new production, Liz's fury erupts, not from having seen it, but from the sheer possibility of their disagreement. As their civilized world shatters in a storm of jargon and betrayal, the unthinkable happens, as furious voices of Greek tragedy and Shakespeare's figures erupt onto the stage, violently invading and transfiguring their reality. An absurd meta-theatrical tragicomedy from Brazil performed in English where worlds collide, discourse meets myth and theatre fights back.
