    copy_long: >-
      In 2016 an unprecedented wave of fake news exploded across our screens.
      Public trust was devastated as Brexit, Trump and an ever-powerful far
      right emerged. The masterminds? A few teens in a former socialist republic
      that even experts struggle to find on a map: Macedonia? 


      Join Nadica, a driven Macedon/Brit on the ground floor of this gold rush who will stop at nothing to build her empire of lies as she defies tech giants, Covid lockdowns and a crumbling economy to champion Britain’s eager and ready supply of Racists, Recessions and Revolutions!
