      M.I.S – All Night Long takes measure of the modern man. How is he really
      doing underneath those woollen socks and comfy sandals? 


      In a hard-boiled mix of jackass stunts and slapstick comedy three men get out of their comfort zone to come to grips with their inner beasts; the Latino lover, the pushover, the best buddy – and all the others – in a quiet battle for a man’s right to be himself. A backdrop of wacky film projections and club music frame the characters’ physical endeavours and keep the audience amazed all night long!
