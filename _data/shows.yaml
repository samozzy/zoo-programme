    copy_long: "Sound the war-croak, sharpen every claw – the frogs and mice are
      going to war! A tragedy has struck Breadnibbler, king of the mice, and
      everyone knows who's to blame: the frogs. Now a battle is coming to the
      pond, and it's time to pick a side: will you fight for the frogs or the
      mice? Originally told as an introduction to epic poetry for Ancient Greek
      children, join our storytellers as they guide you through an interactive
      adaptation, using traditional storytelling, improvised music and toy-box
      puppetry."
