    copy_long: >-
      'What is it about becoming thirty that gives everyone universal permission
      to offer advice on when you’re going to reproduce?' 


      This Offie-nominated play tells the story of Fin, whose world shifts when she unexpectedly falls pregnant, her unconventional career as a zero-hour cycle courier and freelance illustrator suddenly colliding headlong with societal norms and expectations. Untethered + Hinterland bring their

      uniquely collaborative style to Edinburgh with a show that captures the millennial female zeitgeist and holds space for the quietly heavy things that shape us all.
