    copy_long: >-
      A box is mailed to the theatre. The instructions are clear: invite a group
      of people, on a specific night, at a specific time. Place the box at the
      centre of the stage. Wait until an audience member opens the box. The show
      has started.

      Handle with Care is a theatre performance in a box. No actors, no technicians. Just a box. And you. This time, Ontroerend Goed gives you complete control. For an hour, you'll experience something one-off and unrepeatable. Here. Now. Together. No one is watching. Can you create

      something meaningful?
